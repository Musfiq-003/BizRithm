[theme]
base = "dark"
primaryColor = "#6366F1"
backgroundColor = "#0A0F1E"
secondaryBackgroundColor = "#0F172A"
textColor = "#F1F5F9"
font = "sans serif"

[server]
port = 8501
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 100

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[runner]
magicEnabled = true
fastReruns = true
