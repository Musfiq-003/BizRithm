version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bizrithm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bizrithm_db
      POSTGRES_USER: bizrithm
      POSTGRES_PASSWORD: bizrithm123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizrithm -d bizrithm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bizrithm_network

  # ── Redis Cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bizrithm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bizrithm_network

  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: bizrithm_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bizrithm:bizrithm123@postgres:5432/bizrithm_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./uploads:/app/uploads
      - ./reports/generated:/app/reports/generated
      - ./ml_models/saved:/app/ml_models/saved
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bizrithm_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Frontend ───────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: bizrithm_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - bizrithm_network

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bizrithm_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - bizrithm_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  bizrithm_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
